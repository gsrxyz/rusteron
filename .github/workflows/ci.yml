name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  lint:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt

      # aeron archive cmake for some reason starts java
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check clippy lints
        run: cargo clippy --all -- --deny warnings

      - name: Check docs
        run: |
          sudo apt-get update && sudo apt-get install -y uuid-dev libbsd-dev
          cargo test --doc

  memory-check:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Memory Check (Valgrind)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests under Valgrind
        run: |
          cargo install just
          just test-valgrind

  sanitize:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Sanitizer (AddressSanitizer)
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl pkg-config libssl-dev libbsd-dev uuid-dev ca-certificates make cmake gcc g++ clang zlib1g-dev

      # aeron archive cmake for some reason starts java
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Find ASan runtime path
        id: asan-path
        run: |
          # Get clang's resource directory
          RESOURCE_DIR=$(clang -print-resource-dir)
          echo "Clang resource dir: $RESOURCE_DIR"

          # Search for the x86_64 ASan runtime library specifically
          # We need the 64-bit version, not i386 (32-bit)
          ASAN_PATH=$(find "$RESOURCE_DIR" -name "libclang_rt.asan-x86_64.so" -o -name "libclang_rt.asan-x86_64.so.*" | head -1)

          if [ -z "$ASAN_PATH" ] || [ ! -f "$ASAN_PATH" ]; then
            echo "ERROR: ASan runtime (x86_64) not found in clang resource directory"
            echo "Contents of $RESOURCE_DIR:"
            ls -la "$RESOURCE_DIR" || echo "Cannot list directory"
            echo "Searching for any ASan libraries:"
            find "$RESOURCE_DIR" -name "*asan*" 2>/dev/null || true
            exit 1
          fi

          echo "Found ASan runtime at: $ASAN_PATH"
          echo "path=$ASAN_PATH" >> $GITHUB_OUTPUT

      - name: Clean up any stale build artifacts
        run: rm -rf target

      # Single-runtime ASan (mirrors the macOS design in build_common.rs): the
      # `sanitize-address` feature compiles Aeron C with clang's
      # `-fsanitize=address`, and we link clang's libasan into the test binary
      # via the cc linker driver — NO `-Z sanitizer=address`, so rustc does not
      # pull in its own (incompatible) runtime. Using two runtimes (rustc's
      # LLVM-20 vs Ubuntu 22's clang LLVM-14) aborts at startup with
      # "linked against incompatible ASan runtimes". The C side — where the
      # UAF/double-free risks are — is fully instrumented; Rust wrapper code is
      # not, which is the same trade-off as the macOS ASan path.
      - name: Test with AddressSanitizer
        env:
          CC: clang
          CXX: clang++
          RUSTERON_SANITIZE: address
          RUSTFLAGS: "-C target-cpu=x86-64"
          ASAN_OPTIONS: "detect_leaks=1:symbolize=1:allocator_may_return_null=1"
          # LSan suppression file (./lsan.supp at repo root). Real resource-
          # lifecycle leaks in rusteron MUST fail CI (exitcode=23); only known-
          # benign Rust-runtime / external-dep leaks are suppressed here. Add
          # new stanzas to lsan.supp — do NOT weaken this gate. The previous
          # blanket-ignore ("Only memory leaks detected - ignoring") hid the
          # AeronCncMetadata mmap leak.
          LSAN_OPTIONS: "detect_leaks=1:suppressions=./lsan.supp:exitcode=23"
        # Build first WITHOUT LD_PRELOAD (otherwise rustc segfaults). pipefail
        # propagates cargo's exit code through tee: LSan exits 23 on unsuppressed
        # leaks, ASan exits 1 on UAF/double-free — both fail the step.
        run: |
          set -o pipefail
          cargo test -p rusteron-client --features sanitize-address --no-run
          LD_PRELOAD=${{ steps.asan-path.outputs.path }} cargo test -p rusteron-client --features sanitize-address -- --nocapture 2>&1 | tee asan-output.txt

  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: true
      matrix:
#        os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-22.04, macos-latest]
        features: [default, static, multi-threaded]
        rust-version: ["stable"]

    env:
      feature-flags: ${{ matrix.features != 'default' && format('--features {0}', matrix.features) || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
          components: clippy, rustfmt

      - name: Install dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y curl pkg-config libssl-dev libbsd-dev uuid-dev ca-certificates make cmake gcc g++ clang zlib1g-dev libbsd-dev

      # aeron archive cmake for some reason starts java
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Clean artifacts on Linux and macOS
        if: runner.os != 'Windows'
        run: rm -rf rusteron-archive/artifacts rusteron-client/artifacts rusteron-media-driver/artifacts

      - name: Clean artifacts on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -LiteralPath 'rusteron-archive/artifacts','rusteron-client/artifacts','rusteron-media-driver/artifacts' -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build
        env:
          PUBLISH_ARTIFACTS: true
        run: |
          cargo build --release --workspace ${{ env.feature-flags }}

      - name: Test
        run: |
          cargo test --workspace --all --all-targets ${{ env.feature-flags }} -- --nocapture

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.features }}
          retention-days: 1
          path: |
            rusteron-archive/artifacts
            rusteron-client/artifacts
            rusteron-media-driver/artifacts
